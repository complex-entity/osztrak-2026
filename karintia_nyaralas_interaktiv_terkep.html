<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Karintia családi térkép</title>

<style>
html, body {
  height:100%;
  margin:0;
}

#map{
  height:100%;
}

.legend{
  background:white;
  padding:10px;
  margin:10px;
  font-family:Arial;
  font-size:14px;
  border-radius:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.legend div{
  margin-bottom:4px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

function initMap(){

const szallas = {lat:46.6055,lng:14.5665};

const map = new google.maps.Map(document.getElementById("map"),{
zoom:10,
center:szallas
});

const places = [

{
name:"Szállás (Airbnb)",
pos:{lat:46.6055,lng:14.5665},
desc:"Airbnb Obernarrach",
link:"https://maps.google.com/?q=46.6055,14.5665",
color:"red"
},

{
name:"Turnersee",
pos:{lat:46.606,lng:14.575},
desc:"Meleg alpesi fürdőtó",
link:"https://maps.google.com/?q=Turnersee",
color:"blue"
},

{
name:"Klopeiner See",
pos:{lat:46.608,lng:14.588},
desc:"Karintia egyik legmelegebb tava",
link:"https://maps.google.com/?q=Klopeiner+See",
color:"blue"
},

{
name:"Wörthersee",
pos:{lat:46.63,lng:14.14},
desc:"Híres karintiai tó",
link:"https://maps.google.com/?q=Wörthersee",
color:"blue"
},

{
name:"Vogelpark Turnersee",
pos:{lat:46.6065,lng:14.566},
desc:"Madárpark állatsimogatóval",
link:"https://maps.google.com/?q=Vogelpark+Turnersee",
color:"orange"
},

{
name:"Walderlebniswelt",
pos:{lat:46.611,lng:14.595},
desc:"Erdős kalandpark gyerekeknek",
link:"https://maps.google.com/?q=Walderlebniswelt",
color:"orange"
},

{
name:"Tierpark Rosegg",
pos:{lat:46.586,lng:14.019},
desc:"Állatpark kastélyparkkal",
link:"https://maps.google.com/?q=Tierpark+Rosegg",
color:"orange"
},

{
name:"Tscheppaschlucht",
pos:{lat:46.458,lng:14.263},
desc:"Szurdoktúra vízesésekkel",
link:"https://maps.google.com/?q=Tscheppaschlucht",
color:"green"
},

{
name:"Petzen Mountain",
pos:{lat:46.514,lng:14.787},
desc:"Hegyi túrák és panoráma",
link:"https://maps.google.com/?q=Petzen",
color:"green"
},

{
name:"Sablatnigmoor",
pos:{lat:46.602,lng:14.56},
desc:"Természetvédelmi terület",
link:"https://maps.google.com/?q=Sablatnigmoor",
color:"green"
},

{
name:"Burg Hochosterwitz",
pos:{lat:46.761,lng:14.429},
desc:"Ikonikus középkori vár",
link:"https://maps.google.com/?q=Burg+Hochosterwitz",
color:"purple"
},

{
name:"Pyramidenkogel Tower",
pos:{lat:46.593,lng:14.143},
desc:"Európa legmagasabb fa kilátója",
link:"https://maps.google.com/?q=Pyramidenkogel",
color:"purple"
},

{
name:"SPAR St Kanzian",
pos:{lat:46.6078,lng:14.5856},
desc:"Szupermarket",
link:"https://maps.google.com/?q=SPAR+St+Kanzian",
color:"cyan"
},

{
name:"BILLA St Kanzian",
pos:{lat:46.6069,lng:14.5868},
desc:"Szupermarket",
link:"https://maps.google.com/?q=BILLA+St+Kanzian",
color:"cyan"
},

{
name:"HOFER Völkermarkt",
pos:{lat:46.6625,lng:14.634},
desc:"Diszkont bolt",
link:"https://maps.google.com/?q=HOFER+Völkermarkt",
color:"cyan"
},

{
name:"Dego Restaurant",
pos:{lat:46.6087,lng:14.5875},
desc:"Tóparti étterem",
link:"https://maps.google.com/?q=Dego+Restaurant+Klopeiner+See",
color:"black"
}

];

places.forEach(place=>{

const marker = new google.maps.Marker({
position:place.pos,
map:map,
title:place.name,
icon:`http://maps.google.com/mapfiles/ms/icons/${place.color}-dot.png`
});

const info = new google.maps.InfoWindow({
content:`
<h3>${place.name}</h3>
<p>${place.desc}</p>
<a href="${place.link}" target="_blank">Megnyitás Google Mapsben</a>
`
});

marker.addListener("click",()=>{
info.open(map,marker);
});

});

const legend = document.createElement("div");
legend.className="legend";

legend.innerHTML=`
<b>Jelmagyarázat</b><br>
🔴 Szállás<br>
🔵 Tavak / strandok<br>
🟢 Túrák / természet<br>
🟠 Gyerekprogramok<br>
🟣 Látnivalók<br>
🟦 Bevásárlás<br>
⚫ Étterem
`;

map.controls[google.maps.ControlPosition.RIGHT_TOP].push(legend);

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCt2VxrOb9zLBKkBSZu4SFAnn_0XoYDT60&callback=initMap">
</script>

</body>
</html>
